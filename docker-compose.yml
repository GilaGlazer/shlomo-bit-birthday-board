services:
  db:
    image: postgres:16-alpine
    container_name: birthday-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-birthday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-birthday_pass}
      POSTGRES_DB: ${POSTGRES_DB:-birthday_board}
      TZ: ${TZ:-Asia/Jerusalem}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-birthday} -d ${POSTGRES_DB:-birthday_board}']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: birthday-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: ${TZ:-Asia/Jerusalem}
      DATABASE_URL: postgresql://${POSTGRES_USER:-birthday}:${POSTGRES_PASSWORD:-birthday_pass}@db:5432/${POSTGRES_DB:-birthday_board}
      JWT_SECRET: ${JWT_SECRET:-supersecret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: birthday-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
