name: Docker Build & Smoke Test

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done
          echo "Backend never became healthy"
          docker compose logs
          exit 1

      - name: Check frontend is serving
        run: curl -sf http://localhost:5173/ > /dev/null

      - name: Login as demo user and call an authenticated endpoint
        run: |
          curl -sf -c cookies.txt -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@birthday.com","password":"password123"}' > login_response.json
          cat login_response.json
          grep -q '"email":"demo@birthday.com"' login_response.json

          curl -sf -b cookies.txt http://localhost:3000/api/people/today > today_response.json
          cat today_response.json
          grep -q '"success":true' today_response.json

      - name: Dump logs (always, for visibility)
        if: always()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
